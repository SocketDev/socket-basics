name: publish-docker

# Builds, tests, and publishes a multi-arch socket-basics image
# (linux/amd64 + linux/arm64) to GHCR and Docker Hub.
#
# Flow:
#   resolve-version
#     → build-test-push  (matrix: amd64 native, arm64 native — each pushes by digest)
#     → merge-manifests  (assembles per-arch digests into a multi-arch manifest list)
#     → create-release   (tag pushes only)
#
# Tag convention:
#   v2.0.0  — immutable exact release (floating major tags intentionally not published)
#   See docs/github-action.md → "Pinning strategies" for the full rationale.
#
# Required repository secrets:
#   DOCKERHUB_USERNAME  — Docker Hub account name
#   DOCKERHUB_TOKEN     — Docker Hub access token (read/write)

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: "Full git tag to publish (e.g. v2.0.3 or 2.0.3). Must exist in the repo."
        required: true

# Default: deny everything. Each job below grants only what it needs.
permissions:
  contents: read

concurrency:
  group: publish-docker-${{ github.ref }}
  cancel-in-progress: false  # never cancel an in-flight publish

jobs:

  # ── Job 1: Resolve version ─────────────────────────────────────────────────
  # Computes a clean semver string (no v prefix) consumed by downstream jobs.
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.clean }}
    steps:
      - name: 🏷️ Resolve version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            CLEAN="$INPUT_TAG"      # full tag as provided (e.g. 2.0.3 or v2.0.3)
          else
            CLEAN="$REF_NAME"       # e.g. v2.0.3
          fi
          CLEAN="${CLEAN#v}"        # strip leading v if present → 2.0.3
          if [[ ! "$CLEAN" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: $CLEAN" >&2
            exit 1
          fi
          echo "clean=$CLEAN" >> "$GITHUB_OUTPUT"
          echo "ref=refs/tags/v$CLEAN" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.version.outputs.ref }}
          persist-credentials: false

  # ── Job 2: Build → test → push by digest (per arch, native runners) ────────
  # Each matrix entry runs the full build/smoke/integration pipeline on a
  # native runner for its target arch and pushes the resulting image by digest
  # to both registries. The digest is exported as an artifact for the merge job.
  build-test-push:
    name: publish (${{ matrix.arch }})
    needs: resolve-version
    permissions:
      contents: read
      packages: write   # push images to GHCR
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs_on: ubuntu-latest
          - arch: arm64
            runs_on: ubuntu-24.04-arm
    uses: ./.github/workflows/_docker-pipeline.yml
    with:
      name: socket-basics
      dockerfile: Dockerfile
      context: .
      check_set: main
      runs_on: ${{ matrix.runs_on }}
      arch_label: ${{ matrix.arch }}
      push: true
      version: ${{ needs.resolve-version.outputs.version }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  # ── Job 3: Merge per-arch digests into a multi-arch manifest list ──────────
  # Floating major version tags (v2 → latest v2.x.y) are intentionally omitted.
  # Mutable tags are structurally equivalent to :latest and inappropriate for a
  # security tool. Users should pin to an exact version and use Dependabot.
  merge-manifests:
    name: merge-manifests
    needs: [resolve-version, build-test-push]
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Download per-arch digest artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-socket-basics-*
          merge-multiple: true

      - name: 🔨 Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: |
            ghcr.io/socketdev/socket-basics
            ${{ secrets.DOCKERHUB_USERNAME }}/socket-basics
          # Disable the automatic :latest tag — metadata-action adds it by default
          # for semver tag pushes. Mutable tags are inappropriate for a security tool.
          flavor: |
            latest=false
          tags: |
            # Tag push (v2.0.0) → exact immutable version tag only.
            type=semver,pattern={{version}}
            # workflow_dispatch re-publish → use the version input directly
            type=raw,value=${{ needs.resolve-version.outputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: 🧬 Create multi-arch manifest list
        working-directory: /tmp/digests
        env:
          GHCR_IMAGE: ghcr.io/socketdev/socket-basics
          DH_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/socket-basics
          META_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          # Each by-digest push from the matrix step landed blobs in BOTH
          # registries, so per-registry imagetools-create only writes manifests.
          for image in "$GHCR_IMAGE" "$DH_IMAGE"; do
            tag_args=()
            while IFS= read -r tag; do
              [ -z "$tag" ] && continue
              case "$tag" in
                "$image:"*) tag_args+=(-t "$tag") ;;
              esac
            done <<< "$META_TAGS"
            if [ ${#tag_args[@]} -eq 0 ]; then
              echo "→ no tags resolved for $image; skipping" && continue
            fi
            sources=()
            for digest in *; do
              sources+=("${image}@sha256:${digest}")
            done
            echo "→ creating manifest list for $image with ${#sources[@]} arch sources"
            docker buildx imagetools create "${tag_args[@]}" "${sources[@]}"
          done

      - name: 🔍 Inspect published manifest
        env:
          GHCR_IMAGE: ghcr.io/socketdev/socket-basics
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: docker buildx imagetools inspect "${GHCR_IMAGE}:${VERSION}"

  # ── Job 4: Create GitHub release ───────────────────────────────────────────
  # Runs once after the manifest is published (not for workflow_dispatch
  # re-publishes — those don't create new releases).
  # Generates categorised release notes from merged PR labels (.github/release.yml).
  # CHANGELOG updates are intentionally human-authored in the release PR so this
  # workflow never needs to push commits to the protected default branch.
  create-release:
    needs: [resolve-version, merge-manifests]
    if: github.ref_type == 'tag'
    permissions:
      contents: write   # create GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: 📝 Create GitHub release with auto-generated notes
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$REF_NAME" \
            --title "$REF_NAME" \
            --generate-notes \
            --verify-tag \
          || echo "Release already exists (re-run scenario) — skipping creation"
