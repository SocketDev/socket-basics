version: 2
updates:

  # Main Dockerfile — tracks aquasec/trivy, trufflesecurity/trufflehog,
  # ghcr.io/astral-sh/uv, and python base image.
  # NOTE: OPENGREP_VERSION is not trackable via Dependabot (no Docker image);
  #       update it manually in the Dockerfile ARG.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    allow:
      - dependency-name: "python"
      - dependency-name: "ghcr.io/astral-sh/uv"
      - dependency-name: "trufflesecurity/trufflehog"
      - dependency-name: "aquasec/trivy"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore"
      include: "scope"   # → chore(deps): bump trivy from 0.69.2 to 0.69.3
    cooldown:
      default-days: 7

  # app_tests Dockerfile — same as above, plus golang and securego/gosec.
  - package-ecosystem: "docker"
    directory: "/app_tests"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    allow:
      - dependency-name: "python"
      - dependency-name: "golang"
      - dependency-name: "securego/gosec"
      - dependency-name: "trufflesecurity/trufflehog"
      - dependency-name: "aquasec/trivy"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore"
      include: "scope"
    cooldown:
      default-days: 7

  # GitHub Actions — tracks all uses: ... action versions.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 4
    groups:
      github-actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"   # → ci(deps): bump actions/checkout from v3 to v4
    cooldown:
      default-days: 7
